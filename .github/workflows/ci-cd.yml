name: CI/CD -- Restaurant API

permissions:
  contents: read

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main
      - develop

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/restaurant-api

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Installer .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Mettre en cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restaurer les dépendances
        run: dotnet restore

      - name: Compiler le projet
        run: dotnet build --no-restore --configuration Release

      - name: Exécuter les tests
        run: dotnet test --no-build --configuration Release --verbosity normal

  docker-publish:
    name: Docker Build & Publish
    runs-on: ubuntu-latest
    needs: build-and-test
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' ||
      startsWith(github.ref, 'refs/tags/v'))
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      is-release: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4

      - name: Configurer Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Générer les tags et métadonnées
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Builder et pousser l image Docker
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Presentation/Restaurants.Presentation.Api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé du build
        run: |
          echo '## Image Docker publiée' >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo '| Clé | Valeur |' >> $GITHUB_STEP_SUMMARY
          echo '|-----|--------|' >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Tags | ${{ steps.meta.outputs.tags }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Digest | ${{ steps.build.outputs.digest }} |" >> $GITHUB_STEP_SUMMARY

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: docker-publish
    permissions:
      contents: write
    environment:
      name: ${{ startsWith(github.ref, 'refs/tags/v') && 'production' || 'staging' }}
    steps:
      - name: Checkout du code source
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Récupérer le tag de l image
        id: image
        run: |
          TAG='${{ needs.docker-publish.outputs.image-tag }}'
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Image à déployer : ${{ env.IMAGE_NAME }}:$TAG"

      - name: Mettre à jour compose.yaml avec le nouveau tag
        run: |
          sed -i 's|image: .*restaurant-api.*|image: ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}|' compose.yaml
          echo '=== compose.yaml après mise à jour ==='
          grep 'image:' compose.yaml

      - name: Committer la mise à jour du compose.yaml
        run: |
          git config user.name 'GitHub Actions'
          git config user.email 'actions@github.com'
          git add compose.yaml
          git commit -m "deploy: image ${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}" || echo 'Rien à committer'
          git push || echo 'Push ignoré'

      - name: Résumé du déploiement
        run: |
          echo '## Déploiement réussi' >> $GITHUB_STEP_SUMMARY
          echo "**Image déployée** : \`${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}\`" >> $GITHUB_STEP_SUMMARY
